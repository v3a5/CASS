<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CaSS Admin Dashboard</title>

<link rel="stylesheet" href="css/admin.css">

<script src="https://cdn.jsdelivr.net/npm/cassproject@latest/cass.min.js"></script>

</head>

<body>

<div class="admin-bar">
    <span class="logo">CaSS Admin</span>
</div>

<div class="admin-layout">

<!-- Sidebar -->
<div class="sidebar">

<h2>Dashboard</h2>

<button onclick="showDashboard()">Overview</button>
<button onclick="loadSkills()">Skills</button>
<button onclick="clearSkills()">Clear</button>

</div>

<!-- Main Panel -->
<div class="main">

<div id="dashboard">

<div class="widget">
<h3>Welcome</h3>
<p>CaSS competency management dashboard.</p>
</div>

<div class="widget">
<h3>Framework</h3>
<p>Use the sidebar to load competencies.</p>
</div>

</div>

<div id="skills"></div>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
